name: Tests
on:
  push:
    branches:
      - main
  pull_request:

permissions:
  contents: read

jobs:
  check-motoko-changes:
    uses: ./.github/workflows/check-motoko-changes.yml

  validate-changelog:
    needs: check-motoko-changes
    if: github.event_name == 'pull_request' && github.event.pull_request.base.ref == 'main'
    continue-on-error: true
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v6
      - uses: ./.github/actions/setup
        with:
          setup-mops: false
      - run: npm run validate:changelog
      - name: Verify Changelog updated when Motoko source files changed
        if: needs.check-motoko-changes.outputs.has_src_mo_changes == 'true'
        run: |
          if [ "${{ needs.check-motoko-changes.outputs.has_changelog_changes }}" != "true" ]; then
            echo "Error: Motoko files were modified but Changelog.md was not updated"
            exit 1
          fi
          echo "Changelog.md was updated"

  validate-version:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v6
      - uses: ./.github/actions/setup
        with:
          setup-mops: false
      - run: npm run validate:version

  check-orphans:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v6
      - uses: ./.github/actions/setup
      - run: npm run check:orphans

  validate-api:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v6
      - uses: ./.github/actions/setup
      - run: npm run validate:api
      - name: Check for API changes
        run: |
          DIFF=$(git diff -- validation/api)
          if [ -n "$DIFF" ]; then
            echo "API changes:"
            echo "$DIFF"
            echo
            echo '>>> If this looks correct, please run the command `npm run validate` and commit the output.'
            echo
            exit 1
          fi

  validate-docs:
    needs: check-motoko-changes
    if: needs.check-motoko-changes.outputs.has_src_mo_changes == 'true' || needs.check-motoko-changes.outputs.has_mops_package_version_changes == 'true' || needs.check-motoko-changes.outputs.has_validate_docs_script_changes == 'true'
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v6
      - uses: ./.github/actions/setup
      - name: Validate docs for changed src/*.mo files
        if: needs.check-motoko-changes.outputs.has_mops_package_version_changes == 'false' && needs.check-motoko-changes.outputs.has_validate_docs_script_changes == 'false'
        shell: bash
        run: |
          set -euo pipefail
          files=()
          while IFS= read -r file; do
            [[ -n "$file" ]] && files+=("$file")
          done <<< "${{ needs.check-motoko-changes.outputs.src_mo_changed_files }}"
          if [[ ${#files[@]} -eq 0 ]]; then
            echo "No changed src/*.mo files."
            exit 0
          fi
          npm run validate:docs -- "${files[@]}"
        env:
          FORCE_COLOR: 2 # https://github.com/chalk/supports-color/issues/106
      - name: Validate all docs on version or script change
        if: needs.check-motoko-changes.outputs.has_mops_package_version_changes == 'true' || needs.check-motoko-changes.outputs.has_validate_docs_script_changes == 'true'
        run: npm run validate:docs
        env:
          FORCE_COLOR: 2 # https://github.com/chalk/supports-color/issues/106

  format:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v6
      - uses: ./.github/actions/setup
      - run: npm run format:check

  test:
    needs: check-motoko-changes
    if: |
      needs.check-motoko-changes.outputs.has_mo_changes == 'true' ||
      needs.check-motoko-changes.outputs.has_mops_dependency_changes == 'true'
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v6
      - uses: ./.github/actions/setup
      - run: npm test

  bench:
    needs: check-motoko-changes
    if: |
      needs.check-motoko-changes.outputs.has_mo_changes == 'true' ||
      needs.check-motoko-changes.outputs.has_mops_dependency_changes == 'true'
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v6
      - uses: ./.github/actions/setup
        with:
          setup-dfx: true
      - name: Run benchmarks (same path as mops publish)
        run: npx mops bench
